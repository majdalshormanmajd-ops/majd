    <style>
        /* إضافة ستايل بسيط للزر الجديد عشان يلبق مع التصميم */
        #next-page-btn {
            background: #ff6b81;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            margin-top: 15px;
            transition: 0.3s;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
        }

        #next-page-btn:hover {
            background: #ff4757;
            transform: scale(1.05);
        }

        .card2-content h2 {
            min-height: 150px; /* عشان المربع ما يصغر ويكبر مع الكلام */
            transition: opacity 0.5s ease;
        }
    </style>

<body>

            <div class="right">

                <div class="cricle">
                    <div class="text__cricle">

        <div class="decorate_star star1" style="--t: 15s;"></div>

        <div class="decorate_flower--one" style="--t: 15s;"><img width="20" src="./images/decorate_flower.png" alt=""></div>

        <div class="decorate_flower--three" style="--t: 15.6s;"><img width="20" src="./images/decorate_flower.png" alt=""></div>
        <div class="decorate_bottom"><img src="./images/decorate.png" alt="" width="100"></div>

        <div class="boxMail">
            <i class="fa-solid fa-xmark"></i>
            <div class="boxMail-container">
                <div class="card1">
                    <div class="userImg"><img src="images/unnamed.png" alt=""></div>
                    <h4 class="username">To: نوني<span class="underline"></span></h4>
                    <h3>Happy Birthday</h3>
                    <div class="imageCute"><img src="cute1.png" alt=""></div>
                </div>
                <div class="card2">
                    <div class="card2-content">
                        <h3>To You!</h3>
                        <h2 id="paginated-text"></h2>
                        <button id="next-page-btn">التالي ❤️</button>
                        
                        <div class="imageCute2">
                            <img src="cute2.png" alt="">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- إعدادات نظام الصفحات مع رسالتك الجديدة ---
        const messagePages = [
            "حبيبتي نوني، كل عام وانتي بألف خير وصحة وسلامة يدنياي، يا أغلى ما عندي، هاد التاريخ مو أي تاريخ يوم عادي، هاد التاريخ الي اجت فيه أكثر إنسانة بحبها، أحلى مخلوقة بالكون كله.",
            "قد ما صارت بينا أشياء يروحي، صدقيني ما رح يميل قلبي لغيرك، ولو شو ما صار، بحبك حب ما بقدر أعبر عنه بالكلام، الله يديمك إلي يا أحلى إنسانة دخلت حياتي، قلبي وروحي ودنيتي كلها.",
            "لما احكي هاد الكلام جد بعنيه حرفيًا انتي روحي وحياتي ينوني، ما بقدر أعيش بدونك، وجودك بحياتي ضوى أيامي وصارت كل لحظة أحلى من اللي قبلها، ما عمرني ما رتحت لما حكيت معك، حرفيًا لقيت حالي فيكي.",
            "بتمنى يا أغلى ما عندي ما ييجي ويخلينا نبعد، لاني جد حبيتك حبك بيكبر في قلبي كل يوم، رح أكون دايمًا جنبك، سواء بكل حالاتك، لأنك أهم من كل شيء بالنسبة إلي.",
            "أتمنى نكمل حياتنا مع بعض، ونبني ذكريات ما تنسى، ونكون سند لبعضنا طول العمر وأتمنى أيامك كلها فرح وسعادة، وتظلي دايمًا مبتسمة لأن ابتسامتك عالم كامل بالنسبة إلي.",
            "وكل لحظة معك بتغير مزاجي وكل كلمة منك أجمل قصة حب، ولو مهما حاولت الكلمات تعبر حبك أكبر من أي كلام هو شعور ما بينوصف، وصدقيني مهما صار بحياتي مهما تغير كل شي.",
            "أنا دايمًا معك وما في شي بالدنيا يقدر يقلل من حبي إلك، كل ثانية وكل دقيقة بزيد حبي الك، فعلا ينون اني محظوظ لانك معي، بتستاهلي كل خير يا أطيب وأحنّ إنسانة يارب اكون كافي الك وما أكون بضايقك بأي شي.",
            "بس تأكدي ينون اني ما رح احب غيرك، ولو بعد سنين، انتي حبي الأول والأخير كل عام وانتي بألف خير، جد كثير بحبك، ولا تشكي إنه فيه حدا بحبك أكثر مني ها بشخصن 💗💞💖"
        ];

        let currentPage = 0;
        const textElement = document.getElementById('paginated-text');
        const nextBtn = document.getElementById('next-page-btn');

        function updateMessage() {
            // تأثير اختفاء بسيط عند التبديل
            textElement.style.opacity = 0;
            setTimeout(() => {
                textElement.innerText = messagePages[currentPage];
                textElement.style.opacity = 1;
                
                // إذا وصلنا لآخر صفحة نغير نص الزر
                if (currentPage === messagePages.length - 1) {
                    nextBtn.innerText = "أحبك 💖";
                } else {
                    nextBtn.innerText = "التالي ❤️";
                }
            }, 300);
        }

        nextBtn.onclick = function() {
            if (currentPage < messagePages.length - 1) {
                currentPage++;
                updateMessage();
            } else {
                // إذا ضغط بعد النهاية نرجعه لأول صفحة
                currentPage = 0;
                updateMessage();
            }
        }

        // تشغيل أول صفحة عند البداية
        updateMessage();

        // --- تعديل التاريخ بناءً على طلبك ---
        let datetxt = "3 April";
        let datatxtletter = "My love. You are a very special girl. I always silently thank you for coming into my life. Today, I wish you all the best, lots of health, and lots of joy. I always hope we will celebrate many more birthdays like this together. Happy birthday to you.💕";
        let titleLetter = "To you";
        let charArrDate = datetxt.split('');
        let charArrDateLetter = datatxtletter.split('');
        let charArrTitle = titleLetter.split('');
        let currentIndex = 0;
        let currentIndexLetter = 0;
        let currentIndexTitle = 0;
        let date__of__birth = document.querySelector(".date__of__birth span");
        
        setTimeout(function () {
            timeDatetxt = setInterval(function () {
                if (currentIndex < charArrDate.length) {
                    date__of__birth.textContent += charArrDate[currentIndex];
                    currentIndex++;
                }
                else {
                    let i = document.createElement("i");
                    i.className = "fa-solid fa-star"
                    document.querySelector(".date__of__birth").prepend(i)
                    document.querySelector(".date__of__birth").appendChild(i.cloneNode(true))
                    clearInterval(timeDatetxt)
                }
            }, 100)
        }, 12000)

        let mailBox = document.querySelector('.mail')
        let boxmail = document.querySelector('.boxMail')
        var close = document.querySelector('.fa-xmark')

        mailBox.onclick = function () {
            mailBox.classList.toggle('active')
            boxmail.classList.add('active')
            // تصفير الرسالة عند الفتح
            currentPage = 0;
            updateMessage();
        }

        close.addEventListener('click', function () {
            boxmail.classList.remove('active')
        })

        // الكود الإضافي لزر القائمة الأصلية
        $("#btn__letter").on("click", function () {
            // تنفيذ الأنميشن الأصلي
        });
    </script>
